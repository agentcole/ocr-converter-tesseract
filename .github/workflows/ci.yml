name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --omit=optional skips platform-specific optional deps (e.g.
        # electron-builder-squirrel-windows) that are absent from the
        # lock file when it was generated on a different OS.
        run: npm ci --omit=optional

      - name: Build
        run: npm run build
