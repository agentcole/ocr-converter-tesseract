name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxss1 \
            libxtst6

      - name: Install dependencies
        # --omit=optional skips platform-specific optional deps (e.g.
        # electron-builder-squirrel-windows) absent from the lock file
        # when it was generated on a different OS.
        run: npm ci --omit=optional

      - name: Build
        run: npm run build
